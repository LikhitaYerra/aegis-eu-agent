services:
  - type: web
    name: aegis-eu-agent
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt && npm --prefix frontend ci && npm --prefix frontend run build
    startCommand: uvicorn api:app --app-dir src --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_INPUT_COST_PER_1M
        value: "0.40"
      - key: OPENAI_OUTPUT_COST_PER_1M
        value: "1.60"
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: TOKEN_BUDGET
        value: "12000"
